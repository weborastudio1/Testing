<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<h1>Product Admin Panel</h1>

<div class="form-box">
  <h2>Add / Edit Product</h2>

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Original Price">
  <input id="discountPrice" placeholder="Discount Price">
  <input id="discountPercent" placeholder="Discount %">
  <input id="tagline" placeholder="Tagline">
  <input id="colours" placeholder="Colours Available">
  <input id="material" placeholder="Material">
  <input id="stock" placeholder="Stock">
  <textarea id="description" placeholder="Description"></textarea>
  <textarea id="delivery" placeholder="Delivery Details"></textarea>

  <button onclick="saveProduct()">Save Product</button>
</div>

<div class="list-box">
  <h2>All Products</h2>
  <div id="productList"></div>
</div>

<script src="products/products-data.js"></script>
<script src="admin.js"></script>

</body>
</html>
