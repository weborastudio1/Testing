<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dreamy Scrunch | Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li onclick="showSection('dashboard')">Dashboard</li>
      <li onclick="showSection('products')">Products</li>
      <li onclick="showSection('settings')">Settings</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Dashboard -->
    <section id="dashboard" class="section active">
      <h1>Welcome Admin 👋</h1>
      <div class="cards">
        <div class="card">Total Products<br><span id="totalProducts">0</span></div>
        <div class="card">Website Status<br><span>Live</span></div>
      </div>
    </section>

    <!-- Products -->
    <section id="products" class="section">
      <h1>Add Product</h1>

      <div class="form">
        <input type="text" id="pName" placeholder="Product Name">
        <input type="text" id="pPrice" placeholder="Price">
        <input type="text" id="pImage" placeholder="Image URL">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <button onclick="addProduct()">Add Product</button>
      </div>

      <h2>Products List</h2>
      <div id="productList"></div>
    </section>

    <!-- Settings -->
    <section id="settings" class="section">
      <h1>Settings</h1>
      <p>Future Firebase / Admin Controls yaha aayenge</p>
    </section>

  </div>

  <script src="admin.js"></script>
</body>
</html>
