<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<h2>🛠 Admin – Product Manager</h2>

<div class="form">
  <input id="name" placeholder="Product Name">
  <input id="price" type="number" placeholder="Original Price">
  <input id="discountPrice" type="number" placeholder="Discount Price">
  <input id="discountPercent" type="number" placeholder="Discount %">
  <input id="tagline" placeholder="Tagline">
  <input id="colours" placeholder="Colours Available">
  <input id="material" placeholder="Material">
  <input id="stock" type="number" placeholder="Stock">
  <textarea id="description" placeholder="Description"></textarea>
  <textarea id="delivery" placeholder="Delivery Details"></textarea>

  <button onclick="saveProduct()">Save Product</button>
</div>

<h3>All Products</h3>
<div id="productList"></div>

<script src="products-data.js"></script>
<script src="admin.js"></script>
</body>
</html>
