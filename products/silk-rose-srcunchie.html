<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silk Rose Scrunchie | Dreamy Scrunch</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../productcss.css">
</head>

<body>

<!-- ===== HEADER (style.css) ===== -->
<header id="header">
  <div class="container nav-wrapper">
    <a href="../index.html" class="logo">Dreamy <span>Scrunch</span></a>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../scrunchies.html">Scrunchies</a></li>
      <li><a href="../dresses.html">Dresses</a></li>
      <li><a href="../our-story.html">Our Story</a></li>
      <li><a href="../contact.html">Get in Touch</a></li>
    </ul>

    <a href="https://instagram.com/dreamyscrunch" target="_blank" class="btn-instagram">
      Order Now
    </a>
  </div>
</header>

<!-- ===== PRODUCT SECTION (productcss.css) ===== -->
<section class="pd-section">
  <div class="container pd-layout">

    <!-- Images -->
    <div class="pd-images">
      <img id="mainImg" class="pd-main-img">
      <div class="pd-thumbs" id="pdThumbs"></div>
    </div>

    <!-- Info -->
    <div class="pd-info">
      <span class="pd-brand" id="pdBrand"></span>
      <h1 class="pd-title" id="pdTitle"></h1>

      <div class="pd-price-box">
        <span class="pd-price" id="pdPrice"></span>
        <span class="pd-original" id="pdOriginal"></span>
        <span class="pd-off" id="pdDiscount"></span>
      </div>

      <button class="pd-order-btn" onclick="orderIG()">Order on Instagram</button>

      <p class="pd-desc" id="pdDesc"></p>

      <ul class="pd-meta">
        <li><strong>Color:</strong> <span id="pdColor"></span></li>
        <li><strong>Material:</strong> <span id="pdMaterial"></span></li>
        <li><strong>Stock:</strong> In Stock</li>
        <li><strong>Return:</strong> No return / exchange</li>
      </ul>
    </div>

  </div>
</section>

<!-- ===== FOOTER (style.css) ===== -->
<footer>
  <div class="container">
    <p>© 2026 Dreamy Scrunch • Made with ❤ in India</p>
  </div>
</footer>

<!-- ===== PRODUCT DATA (CONTROL ROOM) ===== -->
<script src="../data/products-data.js"></script>

<script>
/* ===============================
   VARIABLE SETUP ONLY
   =============================== */

const product = PRODUCTS.silk_rose_scrunchie;

/* TEXT BINDING */
document.getElementById("pdBrand").innerText = product.brand;
document.getElementById("pdTitle").innerText = product.name;
document.getElementById("pdPrice").innerText = "₹" + product.price;
document.getElementById("pdOriginal").innerText = "₹" + product.originalPrice;
document.getElementById("pdDiscount").innerText = product.discount;
document.getElementById("pdDesc").innerText = product.description;
document.getElementById("pdColor").innerText = product.color;
document.getElementById("pdMaterial").innerText = product.material;

/* IMAGE BINDING */
const mainImg = document.getElementById("mainImg");
const thumbsBox = document.getElementById("pdThumbs");

mainImg.src = product.images[0];

product.images.forEach(img => {
  const t = document.createElement("img");
  t.className = "pd-thumb";
  t.src = img;
  t.onclick = () => mainImg.src = img;
  thumbsBox.appendChild(t);
});

/* ACTIONS (same logic, variable based) */
function orderIG() {
  const msg = `Hi 👋 I want to order\n\n🛍 ${product.name}\n💰 ₹${product.price}`;
  navigator.clipboard.writeText(msg);
  window.open(
    "https://instagram.com/" + product.instagramUsername,
    "_blank"
  );
  alert("Message copied 📋 Paste in Instagram DM ❤️");
}
</script>

</body>
</html>
