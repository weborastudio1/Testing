<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silk Rose Scrunchie | Dreamy Scrunch</title>
  <meta name="description" content="Premium silk rose scrunchie by Dreamy Scrunch. Soft, elegant & handmade.">

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<!-- ================================================= -->
<!-- =============== EDIT SECTION ==================== -->
<!-- === CLIENT SIRF YAHA CHANGE KARE ================= -->

<script>
const PRODUCT = {
  name: "Silk Rose Scrunchie",
  price: "199",
  originalPrice: "299",
  discount: "33% OFF",
  color: "Rose Pink",
  material: "Premium Silk",
  brand: "Dreamy Scrunch",
  instagramUsername: "dreamy.scrunch",  // without @
  description: "Luxurious handmade silk scrunchie designed for comfort, shine & elegance."
};
</script>

<!-- ============= EDIT SECTION END ================== -->
<!-- ================================================= -->


<section class="product-detail">
  <div class="container product-grid">

    <!-- LEFT : IMAGES -->
    <div class="product-images">
      <div class="main-image placeholder">🌸</div>
      <div class="thumbs">
        <div class="thumb placeholder">🌸</div>
        <div class="thumb placeholder">🌸</div>
        <div class="thumb placeholder">🌸</div>
      </div>
    </div>

    <!-- RIGHT : DETAILS -->
    <div class="product-info">

      <span class="product-brand" id="brand"></span>
      <h1 class="product-title" id="title"></h1>

      <div class="price-box">
        <span class="price-discount" id="price"></span>
        <span class="price-original" id="originalPrice"></span>
        <span class="price-off" id="discount"></span>
      </div>

      <p class="product-desc" id="description"></p>

      <ul class="product-meta">
        <li><strong>Color:</strong> <span id="color"></span></li>
        <li><strong>Material:</strong> <span id="material"></span></li>
        <li><strong>Stock:</strong> <span class="in-stock">In Stock</span></li>
        <li><strong>Return:</strong> No return / exchange</li>
      </ul>

      <!-- INSTAGRAM ORDER BUTTON -->
      <button class="btn-instagram" onclick="orderOnInstagram()">
        Order on Instagram
      </button>

    </div>
  </div>
</section>


<!-- ================= DO NOT TOUCH =================== -->
<script>
document.getElementById("brand").innerText = PRODUCT.brand;
document.getElementById("title").innerText = PRODUCT.name;
document.getElementById("price").innerText = "₹" + PRODUCT.price;
document.getElementById("originalPrice").innerText = "₹" + PRODUCT.originalPrice;
document.getElementById("discount").innerText = PRODUCT.discount;
document.getElementById("description").innerText = PRODUCT.description;
document.getElementById("color").innerText = PRODUCT.color;
document.getElementById("material").innerText = PRODUCT.material;

function orderOnInstagram() {
  const message =
`Hi 👋 I want to order this product ✨

🛍 Product: ${PRODUCT.name}
💰 Price: ₹${PRODUCT.price}
🎨 Color: ${PRODUCT.color}

Please share further details.`;

  navigator.clipboard.writeText(message);
  window.open("https://www.instagram.com/" + PRODUCT.instagramUsername + "/", "_blank");

  alert("Message copied 📋\nPaste it in Instagram DM & send ❤️");
}
</script>
<!-- ================= DO NOT TOUCH END =============== -->

</body>
</html>
