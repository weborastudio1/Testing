<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title id="pageTitle"></title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../productcss.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header id="header">
  <div class="container nav-wrapper">
    <a href="../index.html" class="logo">Dreamy <span>Scrunch</span></a>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../scrunchies.html">Scrunchies</a></li>
      <li><a href="../dresses.html">Dresses</a></li>
      <li><a href="../our-story.html">Our Story</a></li>
      <li><a href="../contact.html">Get in Touch</a></li>
    </ul>

    <a id="headerIG" target="_blank" class="btn-instagram">Order Now</a>
  </div>
</header>

<!-- ===== PRODUCT SECTION ===== -->
<section class="pd-section">
  <div class="container pd-layout">

    <!-- Images -->
    <div class="pd-images">
      <img id="mainImg" class="pd-main-img">
      <div class="pd-thumbs" id="thumbs"></div>
    </div>

    <!-- Info -->
    <div class="pd-info">
      <span class="pd-brand" id="brand"></span>
      <h1 class="pd-title" id="name"></h1>

      <div class="pd-price-box">
        <span class="pd-price" id="price"></span>
        <span class="pd-original" id="originalPrice"></span>
        <span class="pd-off" id="discount"></span>
      </div>

      <button class="pd-order-btn" onclick="orderIG()">Order on Instagram</button>

      <p class="pd-desc" id="description"></p>

      <ul class="pd-meta">
        <li><strong>Color:</strong> <span id="color"></span></li>
        <li><strong>Material:</strong> <span id="material"></span></li>
        <li><strong>Stock:</strong> <span id="stock"></span></li>
        <li><strong>Return:</strong> <span id="returnPolicy"></span></li>
      </ul>
    </div>

  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="container">
    <p>© 2026 Dreamy Scrunch • Made with ❤ in India</p>
  </div>
</footer>

<!-- ===== DATA & LOGIC ===== -->
<script src="../data/products-data.js"></script>

<script>
/* ================================
   PRODUCT BINDING
   ================================ */

const product = PRODUCTS.silk_rose_scrunchie;
const imgBase = "../images/" + product.id + "/";

/* PAGE META */
document.getElementById("pageTitle").innerText =
  product.name + " | Dreamy Scrunch";

/* HEADER */
document.getElementById("headerIG").href =
  "https://instagram.com/" + product.instagramUsername;

/* TEXT */
brand.innerText = product.brand;
name.innerText = product.name;
price.innerText = "₹" + product.price;
originalPrice.innerText = "₹" + product.originalPrice;
discount.innerText = product.discountText;
description.innerText = product.description;
color.innerText = product.color;
material.innerText = product.material;
stock.innerText = product.stock;
returnPolicy.innerText = product.returnPolicy;

/* IMAGES */
mainImg.src = imgBase + product.images[0];

product.images.forEach(img => {
  const t = document.createElement("img");
  t.src = imgBase + img;
  t.className = "pd-thumb";
  t.onclick = () => mainImg.src = t.src;
  thumbs.appendChild(t);
});

/* ORDER */
function orderIG() {
  const msg =
`Hi 👋 I want to order

🛍 ${product.name}
💰 ₹${product.price}
🎨 ${product.color}`;

  navigator.clipboard.writeText(msg);
  window.open("https://instagram.com/" + product.instagramUsername, "_blank");
  alert("Message copied 📋 Paste in Instagram DM ❤️");
}
</script>

</body>
</html>
