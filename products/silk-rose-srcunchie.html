<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Silk Rose Scrunchie | Dreamy Scrunch</title>
  <meta name="description" content="Premium silk rose scrunchie by Dreamy Scrunch.">

  <link rel="stylesheet" href="../style.css">
</head>

<body>

<!-- ================================================= -->
<!-- =============== ✏️ EDIT SECTION ================= -->
<!-- === CLIENT SIRF YAHA CHANGE KARE ================= -->

<script>
const PRODUCT = {
  id: "silk-rose-scrunchie",      // 📁 images/silk-rose-scrunchie/
  images: ["1.jpg", "2.jpg", "3.jpg"],

  name: "Silk Rose Scrunchie",
  price: "199",
  originalPrice: "299",
  discount: "33% OFF",

  color: "Rose Pink",
  material: "Premium Silk",
  brand: "Dreamy Scrunch",

  instagramUsername: "dreamyscrunch", // without @

  description: "Luxurious handmade silk scrunchie designed for comfort, shine & elegance."
};
</script>

<!-- ============= ✏️ EDIT SECTION END ================ -->
<!-- ================================================= -->


<section class="product-detail">
  <div class="container product-grid">

    <!-- LEFT : IMAGES -->
    <div class="product-images">
      <img id="mainImage" class="main-image" src="" alt="Silk Rose Scrunchie">

      <div class="thumbs" id="thumbs"></div>
    </div>

    <!-- RIGHT : DETAILS -->
    <div class="product-info">

      <span class="product-brand" id="brand"></span>
      <h1 class="product-title" id="title"></h1>

      <div class="price-box">
        <span class="price-discount" id="price"></span>
        <span class="price-original" id="originalPrice"></span>
        <span class="price-off" id="discount"></span>
      </div>

      <p class="product-desc" id="description"></p>

      <ul class="product-meta">
        <li><strong>Color:</strong> <span id="color"></span></li>
        <li><strong>Material:</strong> <span id="material"></span></li>
        <li><strong>Stock:</strong> <span class="in-stock">In Stock</span></li>
        <li><strong>Return:</strong> No return / exchange</li>
      </ul>

      <button class="btn-instagram" onclick="orderOnInstagram()">
        Order on Instagram
      </button>

    </div>
  </div>
</section>

<!-- ================= DO NOT TOUCH =================== -->
<script>
/* TEXT DATA */
brand.innerText = PRODUCT.brand;
title.innerText = PRODUCT.name;
price.innerText = "₹" + PRODUCT.price;
originalPrice.innerText = "₹" + PRODUCT.originalPrice;
discount.innerText = PRODUCT.discount;
description.innerText = PRODUCT.description;
color.innerText = PRODUCT.color;
material.innerText = PRODUCT.material;

/* IMAGE SYSTEM */
const basePath = "../images/" + PRODUCT.id + "/";
const mainImage = document.getElementById("mainImage");
const thumbs = document.getElementById("thumbs");

mainImage.src = basePath + PRODUCT.images[0];

PRODUCT.images.forEach(img => {
  const thumb = document.createElement("img");
  thumb.src = basePath + img;
  thumb.className = "thumb";
  thumb.onclick = () => mainImage.src = basePath + img;
  thumbs.appendChild(thumb);
});

/* INSTAGRAM ORDER */
function orderOnInstagram() {
  const msg =
`Hi 👋 I want to order ✨

🛍 Product: ${PRODUCT.name}
💰 Price: ₹${PRODUCT.price}
🎨 Color: ${PRODUCT.color}`;

  navigator.clipboard.writeText(msg);
  window.open("https://www.instagram.com/" + PRODUCT.instagramUsername + "/", "_blank");
  alert("Message copied 📋\nPaste in Instagram DM ❤️");
}
</script>
<!-- ================= DO NOT TOUCH END =============== -->

</body>
</html>
