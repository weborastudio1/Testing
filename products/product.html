<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | Dreamy Scrunch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Global + Product CSS -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../productcss.css">
</head>

<body>

<!-- ========== HEADER ========== -->
<header id="header">
    <div class="container nav-wrapper">
        <a href="index.html" class="logo">Dreamy <span>Scrunch</span></a>

        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="scrunchies.html">Scrunchies</a></li>
            <li><a href="index.html">Dresses 🔒</a></li>
            <li><a href="our-story.html">Our Story</a></li>
            <li><a href="contact.html">Get in Touch</a></li>
        </ul>

        <div class="nav-actions">
            <a href="https://instagram.com/dreamyscrunch" target="_blank" class="btn-instagram">
                Order Now
            </a>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </div>
</header>


<!-- ================= PRODUCT ================= -->
<section class="product-page">
  <div class="container product-layout">

    <!-- Images -->
    <div class="product-images">
      <img
        id="mainImg"
        src="../images/placeholder.jpg"
        alt="Product Image"
      >
    </div>

    <!-- Info -->
    <div class="product-info">

      <span class="brand">Dreamy Scrunch</span>

      <h1 id="pName" class="product-title"></h1>
      <p id="pTagline" class="tagline"></p>

      <!-- Price -->
      <div class="price-box">
        <span class="price" id="pDiscountPrice"></span>
        <span class="original-price" id="pPrice"></span>
        <span class="discount" id="pDiscountPercent"></span>
      </div>

      <!-- Stock -->
      <div class="stock" id="pStock"></div>

      <!-- CTA -->
      <button class="order-btn" onclick="orderInstagram()">
        Order on Instagram
      </button>

      <!-- Description -->
      <div class="description">
        <h3>Description</h3>
        <p id="pDescription"></p>
      </div>

      <!-- Details -->
      <ul class="details">
        <li><strong>Colours:</strong> <span id="pColours"></span></li>
        <li><strong>Material:</strong> <span id="pMaterial"></span></li>
        <li><strong>Delivery:</strong> <span id="pDelivery"></span></li>
      </ul>

    </div>
  </div>
</section>

<!-- ================= FOOTER ================= -->
<footer class="site-footer">
  <div class="container">
    © 2026 Dreamy Scrunch. All rights reserved.
  </div>
</footer>

<!-- ================= FIREBASE LOADER ================= -->
<script type="module">
import { db } from "../firebase.js";
import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>Invalid Product</h2>";
  throw new Error("No product id");
}

const ref = doc(db, "products", id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  document.body.innerHTML = "<h2 style='text-align:center'>Product not found</h2>";
  throw new Error("Product not found");
}

const p = snap.data();

/* Inject Data */
document.getElementById("pName").innerText = p.name;
document.getElementById("pTagline").innerText = p.tagline;
document.getElementById("pDiscountPrice").innerText = "₹" + p.discountPrice;
document.getElementById("pPrice").innerText = "₹" + p.price;
document.getElementById("pDiscountPercent").innerText =
  p.discountPercent + "% OFF";

document.getElementById("pDescription").innerText = p.description;
document.getElementById("pColours").innerText = p.colours;
document.getElementById("pMaterial").innerText = p.material;
document.getElementById("pDelivery").innerText = p.delivery;

document.getElementById("pStock").innerText =
  p.stock > 0 ? "In Stock" : "Out of Stock";

window.orderInstagram = function () {
  const msg =
`Hi 👋 I want to order:

🛍 ${p.name}
💰 ₹${p.discountPrice}`;

  navigator.clipboard.writeText(msg);
  window.open("https://instagram.com/dreamyscrunch", "_blank");
};
</script>

</body>
</html>
