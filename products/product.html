<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product | Dreamy Scrunch</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../productcss.css">
</head>

<body>

<!-- ===== HEADER ===== -->
<header id="header">
  <div class="container nav-wrapper">
    <a href="../index.html" class="logo">Dreamy <span>Scrunch</span></a>
  </div>
</header>

<!-- ===== PRODUCT SECTION ===== -->
<section class="pd-section">
  <div class="container pd-layout">

    <!-- Images (STATIC – untouched as you said) -->
    <div class="pd-images">
      <img id="mainImg" class="pd-main-img" src="../images/placeholder.jpg">
    </div>

    <!-- Info -->
    <div class="pd-info">
      <span class="pd-brand" id="pdBrand"></span>
      <h1 class="pd-title" id="pdTitle"></h1>

      <div class="pd-price-box">
        <span class="pd-price" id="pdPrice"></span>
        <span class="pd-original" id="pdOriginal"></span>
        <span class="pd-off" id="pdDiscount"></span>
      </div>

      <button class="pd-order-btn" onclick="orderIG()">Order on Instagram</button>

      <p class="pd-desc" id="pdDesc"></p>

      <ul class="pd-meta">
        <li><strong>Colours:</strong> <span id="pdColours"></span></li>
        <li><strong>Material:</strong> <span id="pdMaterial"></span></li>
        <li><strong>Stock:</strong> <span id="pdStock"></span></li>
        <li><strong>Delivery:</strong> <span id="pdDelivery"></span></li>
      </ul>
    </div>

  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="container">
    <span>&copy; 2026 Dreamy Scrunch</span>
  </div>
</footer>

<!-- ===== FIREBASE PRODUCT LOADER ===== -->
<script type="module">
import { db } from "../firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center'>Invalid Product</h2>";
  throw new Error("No product id");
}

const ref = doc(db, "products", id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  document.body.innerHTML = "<h2 style='text-align:center'>Product not found</h2>";
  throw new Error("Product not found");
}

const p = snap.data();

// Inject data
document.getElementById("pdBrand").innerText = "Dreamy Scrunch";
document.getElementById("pdTitle").innerText = p.name;
document.getElementById("pdPrice").innerText = "₹" + p.discountPrice;
document.getElementById("pdOriginal").innerText = "₹" + p.price;
document.getElementById("pdDiscount").innerText = p.discountPercent + "% OFF";
document.getElementById("pdDesc").innerText = p.description;
document.getElementById("pdColours").innerText = p.colours;
document.getElementById("pdMaterial").innerText = p.material;
document.getElementById("pdStock").innerText = p.stock > 0 ? "In Stock" : "Out of Stock";
document.getElementById("pdDelivery").innerText = p.delivery;

function orderIG() {
  const msg =
`Hi 👋 I want to order

🛍 ${p.name}
💰 ₹${p.discountPrice}`;

  navigator.clipboard.writeText(msg);
  window.open("https://instagram.com/dreamyscrunch", "_blank");
  alert("Message copied 📋 Paste in Instagram DM ❤️");
}
</script>

</body>
</html>
