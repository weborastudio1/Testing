<h1 id="pName"></h1>
<p id="pTag"></p>
<h2 id="pPrice"></h2>
<p id="pDesc"></p>

<script type="module">
import { db } from "../firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.body.innerHTML = "Invalid Product";
}

const ref = doc(db, "products", id);
const snap = await getDoc(ref);

if (!snap.exists()) {
  document.body.innerHTML = "Product not found";
}

const p = snap.data();

document.getElementById("pName").innerText = p.name;
document.getElementById("pTag").innerText = p.tagline;
document.getElementById("pPrice").innerText = "₹" + p.discountPrice;
document.getElementById("pDesc").innerText = p.description;
</script>
